# ccbot Docker Compose 配置
# 使用方法:
#   1. cp .env.example .env  （填入实际值）
#   2. docker compose up -d

services:
  ccbot:
    build: .
    image: ccbot:latest
    container_name: ccbot
    restart: unless-stopped
    env_file: .env
    environment:
      - CCBOT_AGENT__WORKSPACE=/home/ccbot/.ccbot/workspace
      - LANGSMITH_TRACING=1
    volumes:
      # 持久化 workspace（记忆、技能）
      - ccbot-workspace:/home/ccbot/.ccbot/workspace
      # 持久化去重缓存
      - ccbot-data:/home/ccbot/.ccbot/data
      # 可选：挂载配置文件（JSON 配置优先级低于环境变量）
      # - ./config.json:/home/ccbot/.ccbot/config.json:ro
    ports:
      # A2A 服务器（按需开启）
      - "${A2A_PORT:-8765}:8765"
    command: ["run"]

volumes:
  ccbot-workspace:
  ccbot-data:
